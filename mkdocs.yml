site_name: Dolomites 2026
site_url: https://dolomites.teaham.ca

theme:
  name: material
  palette:
    primary: deep orange

nav:
  - Welcome: index.md
  - Part 1 - Venice:
      - Day 1 (Venice Arrival): day1_venice_val_gardena_arrival.md
  - Part 2 - Western Dolomites:
      - Day 2 (Acclimatization): day2_ortisei_acclimatization.md
      - Day 3 (Val di Funes): day3_val_di_funes.md
      - Day 4 (Alpe di Siusi): day4_alpe_di_siusi.md
      - Day 5 (Seceda): day5_seceda_ridge.md
      - Day 6 (West Split Day): day6_west_split.md
  - Part 3 - Epic Transit:
      - Day 7 (Val Gardena to Cortina): day7_val_gardena_cortina_transit.md
  - Part 4 - Eastern Dolomites:
      - Day 8 (Passo Giau): day8_cinque_torri_passo_giau.md
      - Day 9 (Tre Cime): day9_tre_cime_cadini.md
      - Day 10 (East Split Day): day10_east_split.md
      - Day 11 (Sorapis): day11_lago_di_sorapis.md
  - Part 5 - Venice Return:
      - Day 12 (Return to Venice): day12_venice_arrival.md
      - Day 13 (Venice Highlights): day13_venice_full_day.md
  - Part 6 - Madrid:
      - Day 14 (Transit to Madrid): day14_venice_madrid_transit.md
      - Day 15 (ANYMA Concert): day15_madrid_anyma.md
      - Day 16 (Departure to YYZ): day16_madrid_toronto_departure.md
  - Planning:
      - Logistics: logistics.md
      - To-Do List: todo.md
      - Dolomites Overview Map: dolomites_overview_map.md
      - Maps & Routing: maps.md
  - Extras:
      - Potential Activities: potential_activities.md
      - Ideas for Extra Days: ideas_for_extra.md
      - Day 3 (Test Map): day3_test.md

markdown_extensions:
  - admonition
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
